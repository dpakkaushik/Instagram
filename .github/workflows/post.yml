name: Post to Instagram

on:
  schedule:
    - cron: '0 5 * * *'   # 5 AM UTC = 10:30 AM IST
    - cron: '0 14 * * *'  # 2 PM UTC = 7:30 PM IST
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download fonts
        run: python setup.py

      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "INSTAGRAM_USERNAME=${{ secrets.INSTAGRAM_USERNAME }}" >> .env
          echo "INSTAGRAM_PASSWORD=${{ secrets.INSTAGRAM_PASSWORD }}" >> .env
          echo "NEWS_TOPIC=world news" >> .env
          echo "POST_COUNT=2" >> .env
          echo "POST_INTERVAL_HOURS=12" >> .env
          echo "IG_USER_ID=${{ secrets.IG_USER_ID }}" >> .env
          echo "IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}" >> .env
          echo "IG_APP_SECRET=${{ secrets.IG_APP_SECRET }}" >> .env
          echo "IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}" >> .env

      - name: Run pipeline
        run: python main.py --once
